<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, intial-scale=1.0">
    <title>John Doe | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root{
            --primary: #0ea5e9;
            --secondary: #6366f1;
            --dark:#0f172a;
            --darker:#020617;
            --text-main: #f8fafc;
            --text-dim:#94a3b8;
            --transition: 0.3s ease;
            --font-heading:'Poppins',sans-serif;
            --font-body:'Inter',sans-serif;
        }
      *{
        margin:0;
        padding: 0;
        box-sizing: border-box;
      }
      html{
        scroll-behavior: smooth;
      }
      body{
        font-family: var(--font-body);
        background-color: var(--darker);
        color: var(--text-main);
        line-height: 1.6;
      }
      h1,h2,h3,.logo{
        font-family: var(--font-heading);
      }
      nav{
        position: fixed;
        top:0;
        width: 100%;
        height: 80px;
        background-color: rgba(15,23,42,0.9);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid #1e293b;
        display: flex;
        align-items: center;
        z-index:1000;
      }
      .nav-container{
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .logo{
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: bold;
        font-size: 1.2rem;
      }

      .logo-box{
        width: 40px;
        height: 40px;
        background: linear-gradient(to bottom right,var(--primary),var(--secondary));
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
      }
      .nav-links
      {
        list-style: none;
        display: flex;
        gap: 30px;
        align-items: center;
      }
      .nav-links a{
        text-decoration: none;
        color: var(--text-dim);
        font-size: 0.9rem;
        transition: var(--transition);
      }
      .nav-links a:hover{
        color: var(--primary);
      }
      .btn-talk{
        padding: 8px 20px;
        border-radius: 50px;
        border: 1px solid var(--primary);
        color: var(--primary);
        background: rgba(14, 165, 233, 0.1);
      }
      .hero{
        min-height: 100vh;
        display: flex;
        align-items: center;
        padding-top: 80px;
      }
      .hero-container{
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap:50px;
        align-items: center;
      }
      .hero-content{
        text-align: left;
      }
      .badge{
        display: inline-block;
        padding: 4px 12px;
        background: #1e293b;
        border: 1px solid #334155;
        color: var(--primary);
        border-radius: 20px;
        font-size: 0.8rem;
        margin-bottom: 20px;
      }
      h1{
        font-size: 4rem;
        margin-bottom: 20px;
      }
      .gradient-text{
        background: linear-gradient(to right,var(--primary),var(--secondary));
        -webkit-background-clip:text;
        -webkit-text-fill-color: transparent;
      }
      .hero-description
      {
        color: var(--text-dim);
        font-size: 1.1rem;
        margin-bottom: 30px;
        max-width: 500px;
      }
      .hero-buttons{
        display: flex;
        gap:15px;
      }
      .btn{
       padding: 15px 30px;
       border-radius: 50px;
       text-decoration: none;
       font-weight: bold;
       transition: var(--transition);
      }
      .btn-primary
      {
        background-color: var(--primary);
        color: white;
      }
      .btn-outline
      {
        border:1px solid #334155;
        color: white;
      }
      .hero-visual{
        display: flex;
        justify-content: center;
        position: relative;
      }
      .visual-glow{
        position: absolute;
        width:100%;
        height:100%;
        background:var(--primary);
        border-radius: 50%;
        filter: blur(50px);
        z-index: -1;
        animation: pulse-glow 3s infinite ease-in-out;
      }
      @keyframes pulse-glow{
        0% {transform:scale(1);opacity:0.4 ;}
        50% {transform:scale(1.1);opacity:0.2 ;}
        100%{transform:scale(1);opacity:0.4 ;}
      }
      .profile-circle{
        width:350px;
        height:350px;
        background-color: #1e293b;
        border-radius: 50%;
        border: 2px solid #334155;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-dim);
        overflow: hidden;
      }
      .profile-circle img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
      }
      .icon{
        width: 20px;
        height: 20px;
        vertical-align: middle;
      }
      @media(max-width:768px)
      {
        .hero-container{
          grid-template-columns: 1fr;
          text-align: center;
        }
        .nav-links{
          display: none;
        }
        .hero-content{
          display: flex;
          flex-direction: column;
          align-items: center;
        }
        h1{font-size: 2.5rem;}
      }
    </style>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <nav id="navbar">
        <div class="nav-container">
            <div class="logo">
               <div class="logo-box">TT</div>
                <span>Tshering <span style="color: var(--primary);">Tenzu</span></span>
            </div>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#skills">Skills</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#contact" class="btn-talk">Let's Talk</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <section class="hero" id="home">
            <div class="hero-container">
                <div class="hero-content">
                    <span class="badge">Available for work</span>
                    <h1>Hi, I'm <span class="gradient-text">Tshering Tenzing </span></h1>
                    <h2>I am Developer</h2>
                    <p class="hero-description">
                        I build exceptional digital experiences that are fast, accesible
                        visually appealing, and responsive.
                    </p>
                    <div class="hero-buttons">
                        <a href="#projects" class="btn btn-primary">View Work
                          <i data-lucide="arrow-right" class="icon"></i>
                        </a>
                        <a href="#contact"class="btn btn-outline">Contact Me</a>
                    </div>
                </div>
              <div class="hero-visual">
                <div class="visual-glow"></div>
                <div class="profile-circle">
                  <img src="car.jpg.jpg"
                  alt="Tshering profile">
                <script src="https://unpkg.com/lucide@latest"></script>
              </div>
            </div>
            <script>
              lucide.createIcons();
            </script>
        </section>
    </main>
</body>
</html>
